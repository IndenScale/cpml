# CPML dependency policy
# Generated for cargo-deny 0.19.x

[graph]
all-features = true

[advisories]
ignore = ["RUSTSEC-2024-0436"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Zlib",
    "Unicode-3.0",
    "BSL-1.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "parry3d-f64"
expression = "Apache-2.0 OR MIT"
license-files = []

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
